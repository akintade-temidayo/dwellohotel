<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[#FDF6EF] flex items-center justify-center px-4">
    
    <div class="w-full max-w-4xl bg-[#DDC7BB]  border-2 border-[#2B1B12] rounded-3xl overflow-hidden flex flex-col md:flex-row min-h-[520px]">
    <!-- =====================
        LEFT SIDE — Login Form
    ===================== -->
    <div class="flex-1 px-10 py-12">

    <!-- Back Arrow -->
    <div class="slide-in mb-8">
        <button onclick="history.back()" class="hover:text-[#695346] transition-colors duration-200">
            <i class="fa-solid fa-chevron-left" style="color: #4f3527;"></i>
        </button>
    </div>

      <!-- Title -->
      <div class="slide-in mb-6">
        <h1 class="text-4xl font-bold text-[#2B1B12] mb-1">
          Welcome Back
        </h1>

        <p class="text-sm text-[#695346] font-medium tracking-wide mb-5">
            Continue into your account
        </p>
      </div>

      <!-- Email Input -->
      <form action="" id="loginForm" class="slide-in">
        <div class="flex flex-col space-y-1 mb-4">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your email...</label>
                <input 
                    id="email"
                    type="email" 
                    placeholder="johnDeo@gmail.com" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-full text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>

      <!-- Password Input -->
      <div class="slide-in flex flex-col space-y-1 mb-4 mb-5">
        <label class="block text-sm text-sm text-[#4F3527] font-bold">Password</label>
        <div class="relative">
          <input
            type="password"
            id="passwordInput"
            placeholder="••••••••••"
            class="form-input w-full bg-[#FEF7F2] border border-[#4F3527] rounded-full px-5 py-3 text-sm text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm pr-12"
          />
          <!-- Show/Hide Password Toggle -->
          <button
            onclick="togglePassword()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-[#4F3527] hover:text-[#2D1B14] transition-colors"
          >
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <a href="./forgetpassword.html" class="text-[12px] text-[#4F3527] font-medium">
          Forget password?
        </a>
      </div>

      <!-- Log In Button -->
      <div class="slide-in mb-5">
                <button type="submit" id="loginBtn" class="w-full bg-[#2B1B12] hover:bg-[#4F3527] text-white font-semibold py-3 rounded-full transition-all duration-300 text-sm shadow-md hover:shadow-lg">
                Log in
                </button>
            </div>

      </form>
          
  </div>

    <!-- =====================
        DIVIDER LINE
    ===================== -->
    <div class="hidden md:flex items-center justify-center  px-2">
      <div class="divider h-[70%] border border-[#2B1B12]"></div>
    </div>

    <!-- Horizontal divider for mobile -->
    <div class="md:hidden flex items-center gap-4 px-10">
      <div class="flex-1 h-px bg-[#2B1B12]"></div>
      <span class="text-[#4F3527] text-sm font-medium">or</span>
      <div class="flex-1 h-px bg-[#2B1B12]"></div>
    </div>

    <!-- =====================
        RIGHT SIDE — Social Login
    ===================== -->
    <div class="flex-1 flex flex-col items-center justify-center gap-4 px-10 py-12">

      <!-- "or" label — desktop only -->
      <p class="hidden md:block text-[#4F3527] text-sm font-medium mb-2">or</p>

      <!-- Continue with Google -->
      <button class="flex items-center gap-3 bg-[#FEF7F2] border border-[#2B1B12] bg-white hover:bg-[#4F3527] rounded-full px-6 py-3 text-sm font-medium text-[#4F3527] hover:text-[#FEF7F2] transition-all duration-200 w-full max-w-[260px] justify-center shadow-sm hover:shadow-md">
        <!-- Google Icon -->
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Continue with Apple -->
      <a href="/auth/facebook">
        <button class="flex items-center gap-3 bg-[#FEF7F2] border border-[#2B1B12] bg-white hover:bg-[#4F3527] rounded-full px-6 py-3 text-sm font-medium text-[#4F3527] hover:text-[#FEF7F2] transition-all duration-200 w-full max-w-[260px] justify-center shadow-sm hover:shadow-md">
          <!-- Apple Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5">
            <path fill="#1877F2" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
          Continue with Facebook
        </button>
      </a>

      <p class="text-sm text-[#4F3527]">
          Don't have an account?
          <a href="./signin.html" class="underline text-[#2B1B12] font-medium hover:text-[#4F3527] transition-colors">Sign Up</a>
        </p>

    </div>

</div>



<div class="fixed bottom-0 left-0 z-50 w-full h-16 bg-[#2B1B12] border-t border-default ">
    <div class=" h-full max-w-lg mx-auto font-medium flex gap-10 items-center justify-center ">
      <a href="./signin.html">
        <button type="button" class="inline-flex flex-col items-center  justify-center px-5 hover:bg-neutral-secondary-medium group">
            <i class="fa-solid fa-user-plus" style="color: #fef7f2;"></i>
            <span class="text-sm text-[#fef7f2] text-body group-hover:border-b-2 p-1 group-hover:border-[#fef7f2] duration-200 transition-all">Sign in</span>
        </button>
      </a>

        <button type="button" class="inline-flex flex-col items-center  justify-center px-5 hover:bg-neutral-secondary-medium group">
            <i class="fa-solid fa-right-to-bracket" style="color: #fef7f2;"></i>
            <span class="text-sm text-[#fef7f2] text-body border-b-2 p-1 border-[#fef7f2]">Log in</span>
        </button>
    </div>
</div>

  <script src="/js-file/login.js"></script>
</body>
</html>
