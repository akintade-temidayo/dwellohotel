<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget password </title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen bg-[#FDF6EF] flex items-center justify-center px-4">
    
    <div class="bg-[#DDC7BB] shadow-md p-10 rounded-3xl md:w-[30rem] m-auto ">
        <h2 class="text-3xl font-bold text-[#2B1B12] mb-1">
            Forget Password
        </h2>
        <p class="text-sm text-[#695346] font-medium tracking-wide mb-10">
            Enter your registered password 
        </p>

        <div class="flex flex-col space-y-1 mb-12">
            <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your email...</label>
            <input 
                type="email" 
                placeholder="johnDeo@gmail.com" 
                class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm">
            <p class="text-sm text-[#4F3527] font-medium">
                Remember the Password? 
                <a href="./login.html" class="text-[#2B1B12] font-bold">Log in</a>
            </p>
        </div>

        <a href="./resetpassword.html">
            <button class="bg-[#FEF7F2] border border-[#4F3527] text-[#2D1B14] px-10 py-2 rounded-xl hover:bg-[#4F3527] hover:text-[#FEF7F2] transition-colours duration-500">
                Submit
            </button>
        </a>
    </div>

</body>
</html>
