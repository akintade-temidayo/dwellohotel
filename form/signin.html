<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Sign-Up</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</style>
</head>
<body class="min-h-screen bg-[#FDF6EF] flex items-center justify-center px-4 py-3">

    <div class="bg-[#DDC7BB] shadow-md p-7 rounded-3xl md:w-[30rem] m-auto ">
        <h2 class="text-3xl font-bold text-[#2B1B12] mb-1">
            Welcome to Dwello!!
        </h2>
        <p class="text-sm text-[#695346] font-medium tracking-wide mb-5">
            Don't have an account? Sign up with your details
        </p>

        <div class="space-y-4 mb-4">
        <div class="flex justify-center items-center gap-3">
            <!-- input 1 -->
            <div class="flex flex-col space-y-1">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your first name...</label>
                <input 
                    type="text" 
                    placeholder="Deo" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>

            <!-- input 1 -->
            <div class="flex flex-col space-y-1">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your last name...</label>
                <input 
                    type="text" 
                    placeholder="John" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>
        </div>

        <div class="flex justify-center items-center gap-3">
            <!-- input 2 -->
            <div class="flex flex-col space-y-1">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your email...</label>
                <input 
                    type="email" 
                    placeholder="johnDeo@gmail.com" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>

            <!-- input 2 -->
            <div class="flex flex-col space-y-1">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your email...</label>
                <input 
                    type="tel" 
                    placeholder="08012345678" 
                    maxlength="11"
                    class="appearance-none w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>
        </div>

        <div class="flex justify-center items-center gap-3">
            <!-- input 3 -->
            <div class="flex flex-col space-y-1">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Enter your password...</label>
                <input 
                    type="password" 
                    placeholder="**********" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>

            <!-- input 4 -->
            <div class="flex flex-col space-y-1 ">
                <label for="input" class="text-sm text-[#4F3527] font-bold">Confirm your password...</label>
                <input 
                    type="password" 
                    placeholder="**********" 
                    class="w-full bg-[#FEF7F2] border border-[#4F3527] py-2 px-4 rounded-xl text-[#2D1B14] placeholder-[#2D1B14]/50 focus:ring-2 focus:ring-[#2D1B14]/20 outline-none transition-all shadow-sm"
                >
            </div>
        </div>

        </div>

        <!-- Terms Checkbox -->
        <div class="slide-in flex items-center gap-2 mb-2">
        <input
            type="checkbox"
            id="terms"
            class="w-4 h-4 accent-[#2B1B12] cursor-pointer rounded-full"
        />
        <label for="terms" class="text-sm text-[#4F3527] cursor-pointer">
            I agree to the
            <a href="#" class="underline text-[#4F3527] hover:text-[#4F3527] transition-colors">Terms & Condition</a>
        </label>
        </div>

            <div class="slide-in mb-5">
                <button class="w-full bg-[#2B1B12] hover:bg-[#4F3527] text-white font-semibold py-3 rounded-full transition-all duration-300 text-sm shadow-md hover:shadow-lg">
                Sign in
                </button>
            </div>

        <div class="relative flex py-5 items-center justify-center mb-2">
            <div class="flex-grow border-t border-[#4F3527]/50"></div>
                
            <span class="flex-shrink mx-4 text-[#4F3527]/50 text-sm">or</span>
            
            <div class="flex-grow border-t border-[#4F3527]/50"></div>
        </div>

        <div class="flex justify-center items-center gap-3 mb-3">
            <button class="w-10 h-10 bg-[#2B1B12] rounded-full p-1 hover:scale-105 transition transform ">
                    <i class="fa-brands fa-google" style="color: #ffffff;"></i>
                </button>
                <button  class="w-10 h-10 bg-[#2B1B12] rounded-full p-1 hover:scale-105 transition transform ">
                    <i class="fa-brands fa-facebook-f" style="color: #ffffff;"></i>
                </button>
        </div>

        <p class="text-center text-sm text-[#4F3527] font-semibold">
            Already own an account?
            <a href="#" class="text-[#2B1B12] font-bold hover:text-opacity-80">Log-in</a>
        </p>
        
    </div>
</body>
</html>
